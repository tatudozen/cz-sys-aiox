version: '3.8'

# CopyZen Sales Pages — Docker Swarm Stack
# ATENÇÃO: Preparado para Story 6.3 — NÃO DEPLOYAR AINDA
# Deploy via Portainer UI — NUNCA via GitHub Actions (NFR-15)
# Domínio: sales.copyzen.com.br → IP 31.97.26.21

services:
  copyzen-sales:
    image: nginx:alpine
    volumes:
      - /srv/sites/sales.copyzen.com.br:/usr/share/nginx/html:ro
    networks:
      - AZ_Net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.copyzen-sales.rule=Host(`sales.copyzen.com.br`)"
        - "traefik.http.routers.copyzen-sales.entrypoints=websecure"
        - "traefik.http.routers.copyzen-sales.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.copyzen-sales-http.rule=Host(`sales.copyzen.com.br`)"
        - "traefik.http.routers.copyzen-sales-http.entrypoints=web"
        - "traefik.http.routers.copyzen-sales-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.services.copyzen-sales.loadbalancer.server.port=80"

networks:
  AZ_Net:
    external: true
