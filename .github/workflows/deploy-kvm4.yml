name: Deploy KVM4

on:
  push:
    branches: [main]

# Only run after CI passes
concurrency:
  group: deploy-kvm4
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build FunWheel
        run: npm run build -w packages/funwheel

      - name: Build Sales Page
        run: npm run build -w packages/sales-page
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$KVM4_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$KVM4_HOST" >> ~/.ssh/known_hosts
        env:
          KVM4_SSH_KEY: ${{ secrets.KVM4_SSH_KEY }}
          KVM4_HOST: ${{ secrets.KVM4_HOST }}

      - name: Deploy FunWheel to KVM4
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            packages/funwheel/dist/ \
            "$KVM4_USER@$KVM4_HOST:$KVM4_DEPLOY_PATH"
        env:
          KVM4_HOST: ${{ secrets.KVM4_HOST }}
          KVM4_USER: ${{ secrets.KVM4_USER }}
          KVM4_DEPLOY_PATH: ${{ secrets.KVM4_DEPLOY_PATH }}

      - name: Deploy Sales Page to KVM4
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            packages/sales-page/dist/ \
            "$KVM4_USER@$KVM4_HOST:$KVM4_SALES_DEPLOY_PATH"
        env:
          KVM4_HOST: ${{ secrets.KVM4_HOST }}
          KVM4_USER: ${{ secrets.KVM4_USER }}
          KVM4_SALES_DEPLOY_PATH: ${{ secrets.KVM4_SALES_DEPLOY_PATH }}
