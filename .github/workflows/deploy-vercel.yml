name: Deploy Vercel (Client Pages)

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Client slug identifier (e.g., acme-corp)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy-client-page:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sales page
        run: npm run build -w packages/sales-page

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: packages/sales-page
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --yes
          else
            vercel --token "${{ secrets.VERCEL_TOKEN }}" --yes
          fi
        env:
          CLIENT_SLUG: ${{ inputs.client_slug }}
