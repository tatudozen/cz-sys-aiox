# Supabase CLI Project Configuration
# https://supabase.com/docs/guides/cli/config
#
# Setup instructions:
#   1. Create project at https://supabase.com/dashboard
#   2. Get project ref from project URL: https://app.supabase.com/project/<project-ref>
#   3. Replace "your-project-ref" below with your actual project ref
#   4. Run: supabase login
#   5. Run: supabase link --project-ref <your-project-ref>
#   6. Run: supabase db push

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
port = 54321
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[functions]
enabled = false
